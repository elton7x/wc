<!DOCTYPE html>
<html lang="pt-AO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAP VIVA — Edição Copa do Mundo 2026 ⚽</title>
    <meta name="description" content="Participe da pesquisa exclusiva ZAP durante a Copa do Mundo 2026. Avalie, vote e ganhe prémios!">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="header">
            <div class="offer-banner">
                🏆 EDIÇÃO COPA DO MUNDO 2026 — OFERTA EXPIRA HOJE <span id="current-date"></span> 🏆

            <div class="logo-wrapper">
                <img src="images/logo-wc2026.png" alt="ZAP — Edição Copa do Mundo FIFA 2026" class="zap-wc-logo">
            </div>
            <div id="earnings-container" class="earnings-container hidden">
                <span class="earnings-label">Prémio:</span>
                <span id="earnings-display" class="earnings-amount">0.00 Kzs</span>
            </div>
            <div id="progress-container" class="progress-bar-container hidden">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </header>

        <main id="app-content" class="glass-card">
            <!-- Content Injected via JS -->
        </main>
    </div>
    <script src="script.js"></script>

</html>
