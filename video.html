<!DOCTYPE html>
<html lang="pt-AO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAP VIVA — Copa do Mundo 2026 — Passo Final ⚽</title>
    <meta name="description" content="Último passo para sacar o seu prémio da Copa do Mundo 2026 na ZAP.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="header">
            <div class="logo-wrapper">
                <img src="images/logo-wc2026.png" alt="ZAP — Edição Copa do Mundo FIFA 2026" class="zap-wc-logo">
            </div>
        </header>

        <main id="app-content" class="glass-card">
            <div class="card-content animate-entry">
                <span style="font-size:2.5rem; margin-bottom:10px;">🎥</span>
                <div class="wc-badge">⚽ Copa do Mundo 2026</div>
                <h2 class="presenter-name">Assista o vídeo abaixo e saque imediatamente</h2>
                
                <div class="video-container" style="margin: 20px 0; width: 100%;">
                    <vturb-smartplayer id="vid-69f00880f8f02c85a9b60d29" style="display: block; margin: 0 auto; width: 100%; max-width: 400px;"></vturb-smartplayer> 
                    <script type="text/javascript"> 
                        var s=document.createElement("script"); 
                        s.src="https://scripts.converteai.net/a417acb9-6f45-4715-af99-4c69dadc4b07/players/69f00880f8f02c85a9b60d29/v4/player.js", 
                        s.async=!0,document.head.appendChild(s); 
                    </script>
                </div>
                
                <div id="delay-btn-container" style="display: none; margin-top: 20px; width: 100%;">
                    <a href="https://pay.kumbipay.com/44c237ce-30a9-4bd6-809f-ec5982d23c77" class="btn-action" style="display: block; text-decoration: none; text-align: center;">⚽ continuar para saque</a>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Mostra o botão após 3 minutos (180000 milissegundos)
        setTimeout(() => {
            const btnContainer = document.getElementById('delay-btn-container');
            if (btnContainer) {
                btnContainer.style.display = 'block';
                btnContainer.style.animation = 'fadeInUp 0.6s ease forwards';
            }
        }, 180000);

        // Transição de entrada da página (Wipe Out)
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.createElement('div');
            overlay.className = 'wc-transition-overlay active-out';
            overlay.innerHTML = `
                <div class="wc-wipe wc-wipe-1"></div>
                <div class="wc-wipe wc-wipe-2"></div>
                <div class="wc-wipe wc-wipe-3"></div>
                <div class="wc-transition-logo-container">
                    <div class="wc-transition-logo">
                        <img src="images/logo-wc2026.png" alt="ZAP — Edição Copa do Mundo FIFA 2026" class="zap-wc-logo">
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            // Efeito sonoro de GOAL ao chegar nesta página
            const goalSound = new Audio('sounds/goal.mp3');
            goalSound.volume = 0.85;
            goalSound.play().catch(() => { });
            
            // Inicia a saída da transição
            setTimeout(() => {
                overlay.classList.add('start-out');
            }, 50);
            
            // Remove o elemento após a animação
            setTimeout(() => {
                overlay.remove();
            }, 1200);
        });
    </script>
</body>

</html>
